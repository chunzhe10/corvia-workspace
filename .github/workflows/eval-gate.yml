name: Quality Gates

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'repos/corvia/crates/corvia-cli/**'
      - 'repos/corvia/crates/corvia-core/**'
      - 'benchmarks/**'
      - 'corvia.toml'

concurrency:
  group: quality-gates-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libclang-dev cmake protobuf-compiler python3 jq

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            repos/corvia/target
          key: eval-gate-${{ runner.os }}-cargo-${{ hashFiles('repos/corvia/Cargo.lock') }}
          restore-keys: |
            eval-gate-${{ runner.os }}-cargo-

      - name: Build corvia
        working-directory: repos/corvia
        run: cargo build --release -p corvia

      - name: Cache fastembed models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-nomic-embed-text-v1.5-${{ hashFiles('corvia.toml') }}
          restore-keys: |
            hf-models-nomic-embed-text-v1.5-

      - name: Start corvia server
        run: |
          repos/corvia/target/release/corvia serve &
          echo "Waiting for corvia server on port 8020..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 2 http://127.0.0.1:8020/health > /dev/null 2>&1; then
              echo "Corvia server ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Corvia server did not start within 30s"
              exit 1
            fi
            sleep 1
          done

      - name: Ingest knowledge base
        run: |
          repos/corvia/target/release/corvia workspace ingest
          echo "Ingestion complete"
          ENTRY_COUNT=$(curl -sf http://127.0.0.1:8020/v1/status | python3 -c "import json,sys; print(json.load(sys.stdin).get('entry_count', 0))" 2>/dev/null || echo "0")
          echo "Entries ingested: $ENTRY_COUNT"
          if [ "$ENTRY_COUNT" -eq 0 ]; then
            echo "ERROR: No entries ingested — eval results would be meaningless"
            exit 1
          fi

      - name: Run RAG eval gate
        id: eval
        env:
          CORVIA_SERVER: http://127.0.0.1:8020
          SUMMARY_JSON: /tmp/eval-summary.json
        run: |
          set +e
          ./benchmarks/ci/eval-gate.sh
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run knowledge health gate
        id: health
        env:
          CORVIA_SERVER: http://127.0.0.1:8020
          SUMMARY_JSON: /tmp/health-summary.json
        run: |
          set +e
          ./benchmarks/ci/health-gate.sh
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Format RAG eval PR comment
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -f /tmp/eval-summary.json ]; then
            python3 benchmarks/ci/format-pr-comment.py \
              --summary /tmp/eval-summary.json \
              --output /tmp/eval-comment.md
          else
            cat > /tmp/eval-comment.md <<'EOF'
<!-- eval-gate-comment -->
## :x: RAG Quality Gate — ERROR

The eval gate script failed before producing results.
Check the workflow logs for details.

Run locally: `./benchmarks/ci/eval-gate.sh`
EOF
          fi

      - name: Format health PR comment
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -f /tmp/health-summary.json ]; then
            python3 benchmarks/ci/format-health-comment.py \
              --summary /tmp/health-summary.json \
              --output /tmp/health-comment.md
          else
            cat > /tmp/health-comment.md <<'EOF'
<!-- health-gate-comment -->
## :x: Knowledge Health Gate — ERROR

The health gate script failed before producing results.
Check the workflow logs for details.

Run locally: `./benchmarks/ci/health-gate.sh`
EOF
          fi

      - name: Post RAG eval PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_ID=$(gh api --paginate \
            "repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" \
            --jq '.[] | select(.body | startswith("<!-- eval-gate-comment -->")) | .id' \
            | head -1) || true
          if [ -n "$COMMENT_ID" ]; then
            gh api -X DELETE "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" || true
          fi
          gh pr comment "${{ github.event.number }}" \
            --body-file /tmp/eval-comment.md

      - name: Post health PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_ID=$(gh api --paginate \
            "repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" \
            --jq '.[] | select(.body | startswith("<!-- health-gate-comment -->")) | .id' \
            | head -1) || true
          if [ -n "$COMMENT_ID" ]; then
            gh api -X DELETE "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" || true
          fi
          gh pr comment "${{ github.event.number }}" \
            --body-file /tmp/health-comment.md

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-results
          path: |
            /tmp/eval-summary.json
            /tmp/health-summary.json
            benchmarks/rag-retrieval/results/eval-*.json
            benchmarks/knowledge-health/results/health-*.json
          if-no-files-found: ignore

      - name: Fail if RAG thresholds breached
        if: always() && steps.eval.outputs.exit_code != '0'
        run: |
          echo "::error::RAG quality gate failed — see PR comment for details"
          exit 1

      - name: Fail if health thresholds breached
        if: always() && steps.health.outputs.exit_code != '0'
        run: |
          echo "::error::Knowledge health gate failed — see PR comment for details"
          exit 1
