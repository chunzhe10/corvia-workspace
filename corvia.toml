[project]
name = "corvia-demo"
scope_id = "corvia"

[workspace]
repos_dir = "repos"
repos = [
    { name = "corvia", url = "https://github.com/chunzhe10/corvia", namespace = "kernel" },
]

[storage]
store_type = "lite"
data_dir = ".corvia"

[embedding]
provider = "corvia"
# Supported models (via corvia-inference + fastembed):
#   "nomic-embed-text-v1.5"  — 768d, 8192 context, recommended default
#   "all-MiniLM-L6-v2"      — 384d, 256 context, lightweight/fast
# IMPORTANT: changing the model requires re-indexing: corvia workspace ingest --fresh
model = "nomic-embed-text-v1.5"
url = "http://127.0.0.1:8030"
dimensions = 768

[server]
host = "127.0.0.1"
port = 8020

[telemetry]
log_format = "json"
