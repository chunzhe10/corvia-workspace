[project]
name = "corvia-demo"
scope_id = "corvia"

[workspace]
repos_dir = "repos"
repos = [
    { name = "corvia", url = "https://github.com/chunzhe10/corvia", namespace = "kernel" },
]

[storage]
store_type = "lite"
data_dir = ".corvia"

[embedding]
provider = "corvia"
# Supported models (via corvia-inference + fastembed):
#   "nomic-embed-text-v1.5"  — 768d, 8192 context, recommended default
#   "all-MiniLM-L6-v2"      — 384d, 256 context, lightweight/fast
# IMPORTANT: changing the model requires re-indexing: corvia workspace ingest --fresh
model = "nomic-embed-text-v1.5"
url = "http://127.0.0.1:8030"
dimensions = 768

[inference]
device = "gpu"
backend = "cuda"
kv_quant = "q8"
flash_attention = true

[inference.chat_models.qwen3]
repo = "bartowski/Qwen_Qwen3-8B-GGUF"
filename = "Qwen_Qwen3-8B-Q4_K_M.gguf"

[inference.chat_models."llama3.2"]
repo = "bartowski/Llama-3.2-3B-Instruct-GGUF"
filename = "Llama-3.2-3B-Instruct-Q4_K_M.gguf"

[inference.chat_models."llama3.2:1b"]
repo = "bartowski/Llama-3.2-1B-Instruct-GGUF"
filename = "Llama-3.2-1B-Instruct-Q4_K_M.gguf"

[merge]
provider = "corvia"
model = "qwen3"

[server]
host = "127.0.0.1"
port = 8020

[telemetry]
log_format = "json"
