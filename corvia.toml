[project]
name = "corvia-demo"
scope_id = "corvia"

[workspace]
repos_dir = "repos"
repos = [
    { name = "corvia", url = "https://github.com/chunzhe10/corvia", namespace = "kernel" },
]

[storage]
store_type = "lite"
data_dir = ".corvia"

[embedding]
provider = "corvia"
model = "all-MiniLM-L6-v2"
url = "http://127.0.0.1:8030"
dimensions = 384

[server]
host = "127.0.0.1"
port = 8020
