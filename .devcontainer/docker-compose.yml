services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true  # keep container alive (docker run -i)
    tty: true         # allocate pseudo-TTY (docker run -t)
    volumes:
      - ..:/workspaces/corvia-workspace:cached
      - corvia-cargo-registry:/usr/local/cargo/registry
      - corvia-cargo-git:/usr/local/cargo/git
      # Docker-outside-of-Docker: expose host daemon so 'docker build' works inside.
      # Image builds go into the host's registry. The host socket path must exist.
      - /var/run/docker.sock:/var/run/docker.sock

  ollama:
    image: ollama/ollama:latest
    profiles: [ollama]  # only starts when explicitly activated
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - corvia-ollama-models:/root/.ollama
    # GPU passthrough and ports injected by docker-compose.override.yml

volumes:
  corvia-cargo-registry:
  corvia-cargo-git:
  corvia-ollama-models:
